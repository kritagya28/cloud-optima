version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js
  - React
  - Firebase Auth
  - Tailwind CSS
routes:
  - path: /
    file: app/page.tsx
    auth_required: false
    description: Landing and Login/Signup portal
  - path: /dashboard
    file: app/dashboard/page.tsx
    auth_required: true
    description: Dashboard Overview displaying cost summaries
  - path: /dashboard/scanner
    file: app/dashboard/scanner/page.tsx
    auth_required: true
    description: Cost Optimization Scanner tool
  - path: /dashboard/reports
    file: app/dashboard/reports/page.tsx
    auth_required: true
    description: Historical cost trend reports and analytics
  - path: /dashboard/settings
    file: app/dashboard/settings/page.tsx
    auth_required: true
    description: AWS configuration credentials management page
features:
  - name: User Authentication
    description: Login or sign up with email and password via Firebase
    files:
      - app/page.tsx
      - app/context/AuthContext.tsx
    entry_route: /
    user_interactions:
      - Fill email address input
      - Fill password input
      - Click Sign In or Register button
      - Toggle between Login and Registration mode
    api_calls: []
    auth_required: false
  - name: Dashboard Summary
    description: View summarized cloud costs and potential savings charts
    files:
      - app/dashboard/page.tsx
    entry_route: /dashboard
    user_interactions:
      - View monthly estimated cost card
      - View potential savings card
      - View active resources count
      - View cost breakdown service chart
    api_calls:
      - method: GET
        endpoint: /api/dashboard/summary
    auth_required: true
  - name: Cloud Cost Scanner
    description: Execute a new scan for waste resources and apply recommended optimizations
    files:
      - app/dashboard/scanner/page.tsx
    entry_route: /dashboard/scanner
    user_interactions:
      - Click "Run Cost Optimization Scan" button
      - See recommendation cards showing instance details and savings
      - Click "Optimize Now" button to apply optimization action
    api_calls:
      - method: GET
        endpoint: /api/resources/scanner
      - method: POST
        endpoint: /api/resources/optimize/:id
    auth_required: true
  - name: AWS Configuration Settings
    description: Enter and save AWS Access Keys securely, and validate the connection
    files:
      - app/dashboard/settings/page.tsx
    entry_route: /dashboard/settings
    user_interactions:
      - Fill AWS Access Key ID input
      - Fill AWS Secret Access Key input
      - Select AWS Region dropdown
      - Click "Save AWS Configuration" button
      - Click "Verify Connection" button
    api_calls:
      - method: POST
        endpoint: /api/settings/aws
      - method: POST
        endpoint: /api/validate-aws
    auth_required: true
  - name: Cost Trend Reports
    description: Display historical analytics charts for cloud costs over time
    files:
      - app/dashboard/reports/page.tsx
    entry_route: /dashboard/reports
    user_interactions:
      - View historical bar/line charts representing monthly cost trends
    api_calls:
      - method: GET
        endpoint: /api/resources/history
    auth_required: true
known_limitations: []
